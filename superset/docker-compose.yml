version: "3.8"
services:
  superset:
    image: apache/superset:2.1.0
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=gmall_superset_secret_key_2024
      - SUPERSET_ADMIN_USERNAME=admin
      - SUPERSET_ADMIN_PASSWORD=54088Cnm,
      - SUPERSET_ADMIN_EMAIL=admin@example.com
    volumes:
      - ./superset_home:/app/superset_home
    networks:
      - superset_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

networks:
  superset_network:
    driver: bridge
