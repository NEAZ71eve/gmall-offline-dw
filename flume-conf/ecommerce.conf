
# E-commerce Flume Configuration
# Collects data from Kafka ecommerce topics and writes to HDFS

# Name the components on this agent
a1.sources = r1 r2
a1.sinks = k1
a1.channels = c1

# ---------------------------
# Source 1: ecommerce-events topic
# ---------------------------
a1.sources.r1.type = org.apache.flume.source.kafka.KafkaSource
a1.sources.r1.kafka.bootstrap.servers = localhost:9092
a1.sources.r1.kafka.topics = ecommerce-events
a1.sources.r1.kafka.consumer.group.id = flume-ecommerce-events-consumer
a1.sources.r1.batchSize = 100
a1.sources.r1.batchDurationMillis = 1000

# ---------------------------
# Source 2: ecommerce-orders topic
# ---------------------------
a1.sources.r2.type = org.apache.flume.source.kafka.KafkaSource
a1.sources.r2.kafka.bootstrap.servers = localhost:9092
a1.sources.r2.kafka.topics = ecommerce-orders
a1.sources.r2.kafka.consumer.group.id = flume-ecommerce-orders-consumer
a1.sources.r2.batchSize = 50
a1.sources.r2.batchDurationMillis = 2000

# ---------------------------
# Sink: HDFS Sink
# ---------------------------
a1.sinks.k1.type = hdfs
a1.sinks.k1.hdfs.path = hdfs://localhost:9000/ecommerce/%Y%m%d/
a1.sinks.k1.hdfs.filePrefix = ecommerce-events
a1.sinks.k1.hdfs.fileSuffix = .log
a1.sinks.k1.hdfs.rollInterval = 300
a1.sinks.k1.hdfs.rollSize = 134217728
a1.sinks.k1.hdfs.rollCount = 0
a1.sinks.k1.hdfs.batchSize = 100
a1.sinks.k1.hdfs.fileType = DataStream
a1.sinks.k1.hdfs.writeFormat = Text
a1.sinks.k1.hdfs.useLocalTimeStamp = true

# ---------------------------
# Channel: Memory Channel
# ---------------------------
a1.channels.c1.type = memory
a1.channels.c1.capacity = 10000
a1.channels.c1.transactionCapacity = 1000

# Bind the sources and sink to the channel
a1.sources.r1.channels = c1
a1.sources.r2.channels = c1
a1.sinks.k1.channel = c1

