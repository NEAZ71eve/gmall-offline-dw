
# ============================================
# Azkaban 作业配置
# ============================================

# 全局配置
job.name=gmall_dw_daily
user.to.proxy=hadoop
execute.as.user=false
use.local.temp.dir=false

# 邮件通知
failure.emails=admin@example.com
success.emails=admin@example.com

# 重试配置
max.retry=3
retry.backoff=5000

# ============================================
# DataX 任务配置
# ============================================

datax.user=root
datax.password=000000
datax.host=localhost
datax.port=3307

# ============================================
# Hive 任务配置
# ============================================

hive.database=gmall
hive.exec.dynamic.partition=true
hive.exec.dynamic.partition.mode=nonstrict

# ============================================
# 日期参数
# ============================================

dt=${date}
prev_dt=${date-1}
